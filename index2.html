<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro</title>

<link rel="stylesheet" href="style2.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="container">

<div class="todo-card">

<h1>✨ TaskFlow Pro</h1>
<p class="subtitle">Manage your tasks efficiently</p>

<div class="input-section">
<input type="text" id="taskInput" placeholder="Add a new task...">

<button onclick="addTask()">
<i class="fas fa-plus"></i>
</button>
</div>

<div class="filters">

<button class="filter active"
onclick="filterTasks('all',this)">
All
</button>

<button class="filter"
onclick="filterTasks('active',this)">
Active
</button>

<button class="filter"
onclick="filterTasks('completed',this)">
Completed
</button>

</div>

<ul id="taskList"></ul>

<div class="footer">

<span id="taskCount">0 Tasks</span>

<button id="clearBtn" onclick="clearCompleted()">
Clear Completed
</button>

</div>

</div>

</div>

<script src="script1.js"></script>

</body>
</html>
